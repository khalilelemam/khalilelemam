name: Sync Pinned Repositories

on:
  # Run every 6 hours to pick up new pins/unpins
  schedule:
    - cron: "0 0 * * 0"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Re-run when this workflow file itself is updated
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-pinned.yml"

permissions:
  contents: write

jobs:
  sync-pinned:
    name: Sync pinned repos into README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README with pinned repos
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner } = context.repo;

            // 1) Fetch the user's pinned repositories via GitHub GraphQL
            const query = `
              query($login: String!) {
                user(login: $login) {
                  pinnedItems(first: 6, types: REPOSITORY) {
                    nodes {
                      ... on Repository {
                        name
                        description
                        url
                        isPrivate
                      }
                    }
                  }
                }
              }
            `;

            const { user } = await github.graphql(query, { login: owner });
            const pinned = user.pinnedItems.nodes.filter(r => !r.isPrivate);

            if (pinned.length === 0) {
              core.warning('No pinned (public) repositories found for ' + owner);
              return;
            }

            // 2) Build the cards and wrap them in an HTML table for a strict grid
            const cards = pinned.map(r =>
              `<a href="${r.url}"><img src="https://github-stats-extended.vercel.app/api/pin/?username=${owner}&repo=${r.name}&theme=tokyonight&hide_border=true" alt="${r.name}"/></a>`
            );

            let htmlTable = `<table align="center" border="0" cellpadding="10" cellspacing="0">\n`;
            for (let i = 0; i < cards.length; i += 2) {
              htmlTable += `  <tr>\n`;
              // Cell 1
              htmlTable += `    <td align="center" valign="top">${cards[i]}</td>\n`;
              // Cell 2 (if it exists)
              if (cards[i + 1]) {
                htmlTable += `    <td align="center" valign="top">${cards[i + 1]}</td>\n`;
              } else {
                htmlTable += `    <td></td>\n`;
              }
              htmlTable += `  </tr>\n`;
            }
            htmlTable += `</table>`;

            // Wrap in the final block string
            const block = `<!-- PINNED_START -->\n<!-- This block is auto-generated by .github/workflows/sync-pinned.yml every Sunday At 00:00 UTC. -->\n<div align="center">\n${htmlTable}\n</div>\n<!-- PINNED_END -->`;

            // 3) Replace the content between the markers in README.md
            const readmePath = 'README.md';
            const readme = fs.readFileSync(readmePath, 'utf8');

            if (!readme.includes('<!-- PINNED_START -->') || !readme.includes('<!-- PINNED_END -->')) {
              core.setFailed('README.md is missing PINNED_START / PINNED_END markers. Add them around the section you want auto-synced.');
              return;
            }

            const updated = readme.replace(
              /<!-- PINNED_START -->[\s\S]*?<!-- PINNED_END -->/,
              block
            );

            if (updated === readme) {
              core.info('README already up to date — no changes needed');
              return;
            }

            fs.writeFileSync(readmePath, updated);
            core.info('README.md updated with ' + pinned.length + ' pinned repos');

            // 4) Commit and push the change
            // Using exec.exec() since github-script exposes the whole @actions/exec module as 'exec'
            await exec.exec('git', ['config', 'user.name', 'github-actions[bot]']);
            await exec.exec('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);
            await exec.exec('git', ['add', readmePath]);
            await exec.exec('git', ['commit', '-m', 'chore: sync pinned repositories from GitHub profile']);
            await exec.exec('git', ['push']);
