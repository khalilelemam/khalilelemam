<svg width="1200" height="140" viewBox="0 0 1200 140" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="55%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="#334155" opacity=".35"/>
    </pattern>

  </defs>

  <!-- Background -->
  <rect width="1200" height="140" fill="url(#bg)"/>
  <rect width="1200" height="140" fill="url(#dots)"/>

  <!-- Decorative network -->
  <g opacity=".18">

    <circle cx="220" cy="95" r="18" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="300" cy="65" r="12" stroke="#06B6D4" stroke-width="1.5"/>
    <circle cx="390" cy="95" r="15" stroke="#3B82F6" stroke-width="1.5"/>

    <line x1="220" y1="95" x2="300" y2="65" stroke="#3B82F6"/>
    <line x1="300" y1="65" x2="390" y2="95" stroke="#06B6D4"/>

    <circle cx="980" cy="95" r="18" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="900" cy="65" r="12" stroke="#06B6D4" stroke-width="1.5"/>
    <circle cx="810" cy="95" r="15" stroke="#3B82F6" stroke-width="1.5"/>

    <line x1="980" y1="95" x2="900" y2="65" stroke="#3B82F6"/>
    <line x1="900" y1="65" x2="810" y2="95" stroke="#06B6D4"/>

  </g>

  <!-- Accent line -->
  <line
      x1="440"
      y1="48"
      x2="760"
      y2="48"
      stroke="url(#accent)"
      stroke-width="2"/>

  <g filter="url(#glow)">
      <circle cx="600" cy="48" r="4" fill="#06B6D4"/>
  </g>

  <!-- Closing text -->
  <text
      x="600"
      y="88"
      fill="#F8FAFC"
      font-size="15"
      font-family="Inter,Segoe UI,sans-serif"
      font-weight="600"
      letter-spacing=".3"
      text-anchor="middle">
      Built with ☕, curiosity, and an unhealthy amount of debugging.
  </text>

  <!-- Small signature -->
  <text
      x="600"
      y="112"
      fill="#64748B"
      font-size="12"
      font-family="ui-monospace, SFMono-Regular, monospace"
      text-anchor="middle">
      © Khalil Elemam
  </text>

</svg>