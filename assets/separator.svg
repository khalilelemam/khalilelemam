<svg width="1200" height="28" viewBox="0 0 1200 28" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
    <linearGradient id="line" x1="0" y1="14" x2="1200" y2="14">
        <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
        <stop offset="20%" stop-color="#3B82F6"/>
        <stop offset="50%" stop-color="#06B6D4"/>
        <stop offset="80%" stop-color="#3B82F6"/>
        <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
</defs>

<line
x1="0"
y1="14"
x2="1200"
y2="14"
stroke="url(#line)"
stroke-width="2"/>

<g filter="url(#glow)">
<circle cx="520" cy="14" r="4" fill="#3B82F6"/>
<circle cx="600" cy="14" r="5" fill="#06B6D4"/>
<circle cx="680" cy="14" r="4" fill="#3B82F6"/>
</g>

<line x1="520" y1="14" x2="600" y2="14" stroke="#3B82F6"/>
<line x1="600" y1="14" x2="680" y2="14" stroke="#3B82F6"/>

</svg>